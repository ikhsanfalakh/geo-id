basePath: /
info:
  contact: {}
  description: |-
    API for Indonesian Administrative Regions (Provinces, Cities, Districts, Villages).

    ## Authentication

    All endpoints support an optional **API Key** via the `X-API-KEY` request header.
    Providing a valid key grants a higher rate limit tier (default: 1 000 req/min).
    Omitting the header falls back to the anonymous tier (default: 60 req/min), identified by client IP.

    ## Rate Limiting

    Every response includes the following headers:

    | Header | Description |
    |--------|-------------|
    | `X-RateLimit-Limit` | Maximum requests allowed in the current window |
    | `X-RateLimit-Remaining` | Requests remaining in the current window |
    | `X-RateLimit-Reset` | Unix timestamp when the window resets |

    When the limit is exceeded the API returns **HTTP 429**.
    Sending an unrecognised API key returns **HTTP 401**.
  title: Geo-ID API
  version: "1.0"
host: localhost:8080
securityDefinitions:
  ApiKeyAuth:
    type: apiKey
    in: header
    name: X-API-KEY
    description: |-
      Optional API key for elevated rate limit tier (1 000 req/min).
      Leave empty to use the anonymous tier (60 req/min, identified by IP).
definitions:
  model.APIErrorResponse:
    description: Error API response wrapper
    properties:
      error:
        example: Region not found
        type: string
      message:
        example: NOT_FOUND
        type: string
      status:
        example: 404
        type: integer
    type: object
  model.APIResponse:
    description: Successful API response wrapper
    properties:
      data: {}
      message:
        example: SUCCESS
        type: string
      status:
        example: 200
        type: integer
    type: object
  model.Region:
    description: Region information
    properties:
      code:
        example: "11"
        type: string
      value:
        example: ACEH
        type: string
    type: object
  model.RateLimitError:
    description: Rate limit exceeded error response
    type: object
    properties:
      success:
        type: boolean
        example: false
      error:
        type: object
        properties:
          code:
            type: string
            example: RATE_LIMIT_EXCEEDED
          message:
            type: string
            example: Too many requests
  model.UnauthorizedError:
    description: Invalid API key error response
    type: object
    properties:
      success:
        type: boolean
        example: false
      error:
        type: object
        properties:
          code:
            type: string
            example: INVALID_API_KEY
          message:
            type: string
            example: Invalid API key
paths:
  /cities/{id}:
    get:
      description: Get specific city/regency details by its code
      parameters:
      - description: City Code (e.g. 11.01)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.Region'
              type: object
        "401":
          description: Unauthorized — invalid API key
          schema:
            $ref: '#/definitions/model.UnauthorizedError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.APIErrorResponse'
        "429":
          description: Too Many Requests — rate limit exceeded
          schema:
            $ref: '#/definitions/model.RateLimitError'
      security:
      - ApiKeyAuth: []
      summary: Get city by ID
      tags:
      - cities
